# Consolidated spring configuration (avoid duplicate keys)
spring:
  application:
    name: gateway-service
  profiles:
    active: dev
  config:
    import: "optional:configserver:"   # qué importar
  cloud:
    config:
      uri: http://localhost:8888       # dónde está el config server
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
          stripPrefix: true
      mvc:
        routes:
          - id: invoice-service-products
            uri: lb://invoice-service
            predicates:
              - Path=/product/**
          - id: invoice-service-cart
            uri: lb://invoice-service
            predicates:
              - Path=/cart-item/**
          - id: invoice-service-invoices
            uri: lb://invoice-service
            predicates:
              - Path=/invoice/**

# Actuator exposure for gateway
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
